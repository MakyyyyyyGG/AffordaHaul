<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfd1f6"/>
      <stop offset="0.45" stop-color="#fde3ea"/>
      <stop offset="1" stop-color="#fefbf4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.38" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd0af"/>
      <stop offset="1" stop-color="#ffb187"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1200" fill="url(#bg)"/>
  <rect width="1920" height="1200" fill="url(#glow)"/>
  <!-- retro striped sun -->
  <g>
    <circle cx="1420" cy="420" r="230" fill="url(#sun)"/>
    <rect x="1170" y="470" width="500" height="26" fill="#fde3ea"/>
    <rect x="1170" y="524" width="500" height="20" fill="#fde3ea"/>
    <rect x="1170" y="570" width="500" height="14" fill="#fde3ea"/>
    <rect x="1170" y="608" width="500" height="9" fill="#fde3ea"/>
