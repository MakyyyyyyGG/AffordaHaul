      <ellipse cx="0" cy="30" rx="12" ry="18" fill="#ffffff"/>
      <ellipse cx="-30" cy="0" rx="18" ry="12" fill="#ffffff"/>
      <ellipse cx="30" cy="0" rx="18" ry="12" fill="#ffffff"/>
      <ellipse cx="-22" cy="-22" rx="14" ry="14" fill="#ffffff"/>
      <ellipse cx="22" cy="-22" rx="14" ry="14" fill="#ffffff"/>
      <ellipse cx="-22" cy="22" rx="14" ry="14" fill="#ffffff"/>
      <ellipse cx="22" cy="22" rx="14" ry="14" fill="#ffffff"/>
      <circle r="16" fill="#ffb187"/>
    </g>
    <g transform="translate(1700 1000) scale(0.7)">
      <ellipse cx="0" cy="-30" rx="12" ry="18" fill="#ffffff"/>
      <ellipse cx="0" cy="30" rx="12" ry="18" fill="#ffffff"/>
      <ellipse cx="-30" cy="0" rx="18" ry="12" fill="#ffffff"/>
      <ellipse cx="30" cy="0" rx="18" ry="12" fill="#ffffff"/>
      <ellipse cx="-22" cy="-22" rx="14" ry="14" fill="#ffffff"/>
