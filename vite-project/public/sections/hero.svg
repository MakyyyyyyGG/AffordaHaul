    <ellipse cx="480" cy="270" rx="120" ry="44" fill="#ffffff"/>
    <ellipse cx="1680" cy="180" rx="150" ry="46" fill="#ffffff" opacity="0.8"/>
  </g>
  <!-- rolling pastel hills -->
